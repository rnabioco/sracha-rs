[package]
name = "sracha"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "Fast SRA downloader and FASTQ converter"

[[bin]]
name = "sracha"
path = "src/main.rs"

[dependencies]
sracha-core.workspace = true
sracha-index = { path = "../sracha-index", optional = true }
chrono.workspace = true
clap.workspace = true
serde_json.workspace = true
tokio.workspace = true
anyhow.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
indicatif.workspace = true
owo-colors.workspace = true
tabled.workspace = true

[features]
default = ["catalog"]
# Pull in the sracha-index crate (vortex, ~50 transitive deps) for
# `--catalog` fast-resolve. Build with --no-default-features to
# strip it for slimmer release binaries.
catalog = ["dep:sracha-index"]

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
tempfile.workspace = true
assert_cmd = "2"
predicates = "3"
