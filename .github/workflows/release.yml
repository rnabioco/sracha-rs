name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      matrix:
        # x86_64 ships two microarchitecture variants: v2 (SSE4.2, every CPU
        # since ~2009 — the safe default) and v3 (AVX2/BMI, Haswell 2013+ —
        # best SIMD throughput on the byte-plane decode loops). ARM targets
        # build a single artifact (no x86 microarch levels apply).
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cpu: x86-64-v2
            suffix: -v2
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cpu: x86-64-v3
            suffix: -v3
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
            cpu: x86-64-v2
            suffix: -v2
          - target: x86_64-apple-darwin
            os: macos-latest
            cpu: x86-64-v3
            suffix: -v3
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}${{ matrix.suffix }}

      - name: Install musl tools (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install cross (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: matrix.target != 'aarch64-unknown-linux-musl'
        env:
          # Empty for ARM (no cpu set); raises the ISA floor for x86 variants.
          RUSTFLAGS: ${{ matrix.cpu && format('-C target-cpu={0}', matrix.cpu) || '' }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          cd target/${{ matrix.target }}/release
          tar czf ../../../sracha-${version}-${{ matrix.target }}${{ matrix.suffix }}.tar.gz sracha
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sracha-${{ github.ref_name }}-${{ matrix.target }}${{ matrix.suffix }}
          path: sracha-*-${{ matrix.target }}${{ matrix.suffix }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract changelog for this version
        id: changelog
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Extract the section between this version's header and the next
          body=$(awk -v ver="$version" '
            /^## / { if (found) exit; if ($0 ~ ver) found=1; next }
            found { print }
          ' CHANGELOG.md)
          # Write to file to preserve newlines
          echo "$body" > release_notes.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: artifacts/**/*.tar.gz
