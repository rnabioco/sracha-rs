name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Check
        run: cargo check --all-targets --all-features

  test:
    name: Test (${{ matrix.os }})
    needs: check
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: Run tests
        run: cargo nextest run --all-features --profile ci

  integration:
    name: Integration Test
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: Cache SRA fixture
        uses: actions/cache@v4
        with:
          path: crates/sracha-core/tests/fixtures
          key: sra-fixture-SRR28588231-v1
      - name: Run integration tests
        run: cargo nextest run -p sracha-core --all-features --profile ci --run-ignored=ignored-only

  coverage:
    name: Coverage
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - uses: taiki-e/install-action@cargo-llvm-cov
      # Coverage measures the default (non-ignored) test suite only; the
      # #[ignore]d integration tests download real SRA files from NCBI and
      # would make the number depend on network state. Tests run once with
      # --no-report; the report steps below reuse the collected profdata.
      - name: Run tests with coverage instrumentation
        run: cargo llvm-cov nextest --all-features --workspace --no-report
      - name: Export lcov
        run: cargo llvm-cov report --lcov --output-path lcov.info
      - name: Generate HTML report
        run: cargo llvm-cov report --html --output-dir coverage-html
      - name: Detailed per-file report → job summary
        run: |
          {
            echo '## Coverage report'
            echo
            echo '_Default (non-ignored) test suite. cSRA / network paths are exercised only by the `#[ignore]`d integration tests and read low here by design._'
            echo
            echo '```'
            cargo llvm-cov report
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload lcov artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info
      - name: Upload HTML report artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage-html
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false

  msrv:
    name: MSRV (1.92)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.92.0
      - uses: Swatinem/rust-cache@v2
      - name: Check MSRV
        run: cargo check --all-targets
