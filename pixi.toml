[workspace]
name = "sracha-rs"
version = "0.3.3"
description = "Fast SRA downloader and FASTQ converter"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64", "osx-arm64"]

[dependencies]
rust = ">=1.92"
python = ">=3.14.4,<3.15"
sra-tools = ">=3.4.1,<4"
vhs = ">=0.11.0,<0.12"
bwa = ">=0.7.18"
samtools = ">=1.21"
sracha = ">=0.3.0,<0.4"

[pypi-dependencies]
zensical = "*"

[tasks]
build = "cargo build"
release = "cargo build --profile release"
release-debug = "cargo build --profile release-with-debug"
test = "cargo test"
check = "cargo check"
clippy = "cargo clippy --all-targets --all-features -- -D warnings"
fmt = "cargo fmt --all"
fmt-check = "cargo fmt --all -- --check"
clean = "cargo clean"
doc = "cargo doc --no-deps --open"
docs-serve = "zensical serve"
docs-build = "zensical build"
tapes = { cmd = "docs/tapes/generate.sh", depends-on = ["release"] }
install-sratools = { cmd = "bash validation/install-sratools.sh", description = "Download NCBI sra-tools (default 3.4.1) into validation/sra-tools/" }

# Fast local dev builds via mold. `mold -run` intercepts the linker exec via
# LD_PRELOAD and works with the compute nodes' system gcc 11.5 — no
# `-fuse-ld=mold` support required, and no glibc-static. GitHub Release
# binaries are built in CI against musl targets and are unaffected.
[feature.dev.dependencies]
mold = ">=2.4"
# clangdev provides libclang for bindgen — pulled in by vortex-metrics
# → customlabels transitive dep in the sracha-index crate. CI builds
# with --no-default-features for sracha-index to skip this.
clangdev = ">=18"

[feature.dev.tasks]
build         = "mold -run cargo build"
release       = "mold -run cargo build --profile release"
release-debug = "mold -run cargo build --profile release-with-debug"
test          = "mold -run cargo test"
check         = "mold -run cargo check"
clippy        = "mold -run cargo clippy --all-targets --all-features -- -D warnings"

[environments]
dev = { features = ["dev"], solve-group = "default" }
